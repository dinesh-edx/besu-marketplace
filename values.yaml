image:
  repository: hyperledger/besu
  tag: 26.5.0
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

storage:
  # For EKS Production
  #className: gp3

  # For Local/K3s Testing
  className: standard

  size: 50Gi

service:
  type: ClusterIP

validators:

  enabled: true

  replicaCount: 1

  rpcEnabled: false

  terminationGracePeriodSeconds: 120

  priorityClassName: ""

  # ---------------------------------------------------
  # Bootnode
  # ---------------------------------------------------
  bootnode:
    enabled: true

    # validator name acting as bootnode
    validator: validator1

  # ---------------------------------------------------
  # Scheduling
  # ---------------------------------------------------
  antiAffinity:
    enabled: true

    # preferred | required
    type: preferred

  topologySpreadConstraints:
    enabled: false

    maxSkew: 1

    topologyKey: topology.kubernetes.io/zone

    whenUnsatisfiable: ScheduleAnyway

  nodeSelector: {}

  tolerations: []

  affinity: {}

  # ---------------------------------------------------
  # Service
  # ---------------------------------------------------
  service:
    headless: true

  # ---------------------------------------------------
  # Probes
  # ---------------------------------------------------
  probes:

    startup:
      enabled: true
      failureThreshold: 30
      periodSeconds: 10

    readiness:
      enabled: true
      initialDelaySeconds: 60
      periodSeconds: 10

    liveness:
      enabled: true
      initialDelaySeconds: 120
      periodSeconds: 20

  # ---------------------------------------------------
  # Metrics
  # ---------------------------------------------------
  metrics:
    enabled: true
    port: 9545

  # ---------------------------------------------------
  # Pod Disruption Budget
  # ---------------------------------------------------
  pdb:
    enabled: true
    minAvailable: 3

rpc:

  enabled: true

  replicas: 2

  terminationGracePeriodSeconds: 120

  nodeSelector: {}

  tolerations: []

  affinity: {}

  # ---------------------------------------------------
  # Service
  # ---------------------------------------------------
  service:
    type: LoadBalancer

    annotations:
      service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
      service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"

  # ---------------------------------------------------
  # Ingress
  # ---------------------------------------------------
  ingress:
    enabled: false

  # ---------------------------------------------------
  # Metrics
  # ---------------------------------------------------
  metrics:
    enabled: true
    port: 9545

  # ---------------------------------------------------
  # Probes
  # ---------------------------------------------------
  probes:

    startup:
      enabled: true
      failureThreshold: 30
      periodSeconds: 10

    readiness:
      enabled: true
      initialDelaySeconds: 30
      periodSeconds: 10

    liveness:
      enabled: true
      initialDelaySeconds: 60
      periodSeconds: 20

resources:

  validator:
    requests:
      memory: "3Gi"
      cpu: "500m"

    limits:
      memory: "8Gi"
      cpu: "2"

  rpc:
    requests:
      memory: "4Gi"
      cpu: "1"

    limits:
      memory: "8Gi"
      cpu: "2"

# ---------------------------------------------------
# Validators
# ---------------------------------------------------
validatorsList:

  - name: validator1
    key: validator1.key

  - name: validator2
    key: validator2.key

  - name: validator3
    key: validator3.key

  - name: validator4
    key: validator4.key

# ---------------------------------------------------
# Monitoring
# ---------------------------------------------------
monitoring:

  enabled: true

  prometheus:
    enabled: false

  grafana:
    enabled: false

  serviceMonitor:
    enabled: false

# ---------------------------------------------------
# Network Policy
# ---------------------------------------------------
networkPolicy:
  enabled: true

# ---------------------------------------------------
# Pod Metadata
# ---------------------------------------------------
podAnnotations: {}

podLabels: {}

# ---------------------------------------------------
# Security Context
# ---------------------------------------------------
securityContext:
  fsGroup: 1000

containerSecurityContext:
  runAsUser: 1000
  runAsGroup: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

# ---------------------------------------------------
# Persistence
# ---------------------------------------------------
persistence:

  enabled: true

  accessModes:
    - ReadWriteOnce

  retainPVC: true

# ---------------------------------------------------
# Service Account
# ---------------------------------------------------
serviceAccount:
  create: true
  name: ""

# ---------------------------------------------------
# Extra Environment Variables
# ---------------------------------------------------
extraEnv: []

# ---------------------------------------------------
# Extra Volumes
# ---------------------------------------------------
extraVolumes: []

# ---------------------------------------------------
# Extra Volume Mounts
# ---------------------------------------------------
extraVolumeMounts: []

# ---------------------------------------------------
# Image Pull Secrets
# ---------------------------------------------------
imagePullSecrets: []

# ---------------------------------------------------
# Global Labels
# ---------------------------------------------------
commonLabels: {}

# ---------------------------------------------------
# Global Annotations
# ---------------------------------------------------
commonAnnotations: {}