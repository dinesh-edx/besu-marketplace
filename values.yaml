image:
  repository: hyperledger/besu
  tag: 26.5.0
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

storage:
  className: gp3
  size: 50Gi

service:
  type: ClusterIP

validators:
  replicaCount: 1

  pdb:
    minAvailable: 3

  rpcEnabled: false

  nodeSelector: {}

  tolerations: []

  affinity: {}

  topologySpreadConstraints: true

  terminationGracePeriodSeconds: 120

  priorityClassName: ""

rpc:
  enabled: true

  replicas: 2

  service:
    type: LoadBalancer

    annotations:
      service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
      service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"

  ingress:
    enabled: false

  nodeSelector: {}

  tolerations: []

  affinity: {}

  terminationGracePeriodSeconds: 120

resources:
  validator:
    requests:
      memory: "3Gi"
      cpu: "500m"

    limits:
      memory: "8Gi"
      cpu: "2"

  rpc:
    requests:
      memory: "4Gi"
      cpu: "1"

    limits:
      memory: "8Gi"
      cpu: "2"

validatorsList:
  - name: validator1
    key: validator1.key

  - name: validator2
    key: validator2.key

  - name: validator3
    key: validator3.key

  - name: validator4
    key: validator4.key

monitoring:
  enabled: true

  serviceMonitor:
    enabled: false

networkPolicy:
  enabled: true

podAnnotations: {}

podLabels: {}

securityContext:
  fsGroup: 1000

containerSecurityContext:
  runAsUser: 1000
  runAsGroup: 1000
  allowPrivilegeEscalation: false

persistence:
  enabled: true

  accessModes:
    - ReadWriteOnce

  retainPVC: true