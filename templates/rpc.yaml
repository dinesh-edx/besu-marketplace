{{- if .Values.rpc.enabled }}

apiVersion: apps/v1
kind: Deployment

metadata:
  name: besu-rpc
  namespace: {{ .Release.Namespace }}

  labels:
    {{- include "besu.rpcLabels" . | nindent 4 }}

spec:
  replicas: {{ .Values.rpc.replicas }}

  revisionHistoryLimit: 3

  selector:
    matchLabels:
      app: besu-rpc

  template:
    metadata:
      labels:
        app: besu-rpc
        {{- include "besu.rpcLabels" . | nindent 8 }}

      annotations:
        checksum/config: {{ include "besu.configChecksum" . }}

        {{- if .Values.monitoring.enabled }}
        {{- include "besu.prometheusAnnotations" . | nindent 8 }}
        {{- end }}

        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}

    spec:

      terminationGracePeriodSeconds: {{ .Values.rpc.terminationGracePeriodSeconds }}

      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}

      {{- with .Values.rpc.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.rpc.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.rpc.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: besu-rpc

      containers:
        - name: besu-rpc

          image: "{{ include "besu.image" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}

          resources:
            requests:
              memory: "{{ .Values.resources.rpc.requests.memory }}"
              cpu: "{{ .Values.resources.rpc.requests.cpu }}"

            limits:
              memory: "{{ .Values.resources.rpc.limits.memory }}"
              cpu: "{{ .Values.resources.rpc.limits.cpu }}"

          args:
            - "--config-file=/etc/besu/config.toml"

            - "--genesis-file=/config/genesis.json"

            - "--data-path=/data"

            - "--node-private-key-file=/secrets/rpc.key"

            - "--rpc-http-enabled=true"
            - "--rpc-http-host=0.0.0.0"
            - "--rpc-http-port=8545"

            - "--rpc-http-api=ADMIN,ETH,NET,WEB3,TXPOOL"

            - "--rpc-ws-enabled=true"
            - "--rpc-ws-host=0.0.0.0"
            - "--rpc-ws-port=8546"

            - "--host-allowlist=*"

            - "--sync-mode=FULL"

            - "--metrics-enabled=true"
            - "--metrics-host=0.0.0.0"
            - "--metrics-port=9545"

            - "--Xdns-enabled=true"
            - "--Xdns-update-enabled=true"

            - "--version-compatibility-protection=false"

            - "--nat-method=NONE"

          ports:
            - containerPort: 30303
              name: rlpx
              protocol: TCP

            - containerPort: 8545
              name: rpc-http
              protocol: TCP

            - containerPort: 8546
              name: rpc-ws
              protocol: TCP

            - containerPort: 9545
              name: metrics
              protocol: TCP

          startupProbe:
            tcpSocket:
              port: 8545
            failureThreshold: 30
            periodSeconds: 10

          readinessProbe:
            tcpSocket:
              port: 8545
            initialDelaySeconds: 30
            periodSeconds: 10

          livenessProbe:
            tcpSocket:
              port: 8545
            initialDelaySeconds: 60
            periodSeconds: 20

          volumeMounts:
            - mountPath: /config
              name: genesis
              readOnly: true

            - mountPath: /etc/besu/config.toml
              name: members
              readOnly: true
              subPath: config.toml

            - mountPath: /etc/besu/static-nodes.json
              name: static-nodes
              readOnly: true
              subPath: static-nodes.json

            - mountPath: /secrets
              name: rpc-key
              readOnly: true

            - mountPath: /data
              name: besu-data

      volumes:
        - name: genesis
          configMap:
            name: besu-genesis-configmap

        - name: static-nodes
          configMap:
            name: besu-static-nodes-json-configmap

        - name: members
          configMap:
            name: besu-rpc-config-toml-configmap

        - name: rpc-key
          secret:
            secretName: besu-network-secret
            items:
              - key: rpc.key
                path: rpc.key

        - name: besu-data
          emptyDir: {}

---
apiVersion: v1
kind: Service

metadata:
  name: besu-rpc
  namespace: {{ .Release.Namespace }}

  labels:
    {{- include "besu.rpcLabels" . | nindent 4 }}

  annotations:
    {{- toYaml .Values.rpc.service.annotations | nindent 4 }}

spec:
  type: {{ .Values.rpc.service.type }}

  selector:
    app: besu-rpc

  ports:
    - name: rpc-http
      port: 8545
      targetPort: 8545
      protocol: TCP

    - name: rpc-ws
      port: 8546
      targetPort: 8546
      protocol: TCP

    - name: metrics
      port: 9545
      targetPort: 9545
      protocol: TCP

    - name: rlpx
      port: 30303
      targetPort: 30303
      protocol: TCP

{{- end }}