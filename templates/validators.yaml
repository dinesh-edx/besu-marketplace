{{- range .Values.validatorsList }}

---
apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: {{ .name }}
  namespace: {{ $.Release.Namespace }}

  labels:
    app: {{ .name }}
    app.kubernetes.io/name: besu
    app.kubernetes.io/component: validator
    app.kubernetes.io/managed-by: Helm

spec:
  serviceName: {{ .name }}

  replicas: {{ $.Values.validators.replicaCount }}

  podManagementPolicy: Parallel

  revisionHistoryLimit: 3

  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain

  selector:
    matchLabels:
      app: {{ .name }}

  template:
    metadata:
      labels:
        app: {{ .name }}
        app.kubernetes.io/name: besu
        app.kubernetes.io/component: validator

      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9545"

    spec:

      terminationGracePeriodSeconds: {{ $.Values.validators.terminationGracePeriodSeconds }}

      securityContext:
        fsGroup: {{ $.Values.securityContext.fsGroup }}

      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/component
                    operator: In
                    values:
                      - validator
              topologyKey: kubernetes.io/hostname

      {{- if $.Values.validators.topologySpreadConstraints }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: validator
      {{- end }}

      containers:
        - name: besu

          image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag }}"

          imagePullPolicy: {{ $.Values.image.pullPolicy }}

          securityContext:
            runAsUser: {{ $.Values.containerSecurityContext.runAsUser }}
            runAsGroup: {{ $.Values.containerSecurityContext.runAsGroup }}
            allowPrivilegeEscalation: {{ $.Values.containerSecurityContext.allowPrivilegeEscalation }}

          resources:
            requests:
              memory: "{{ $.Values.resources.validator.requests.memory }}"
              cpu: "{{ $.Values.resources.validator.requests.cpu }}"

            limits:
              memory: "{{ $.Values.resources.validator.limits.memory }}"
              cpu: "{{ $.Values.resources.validator.limits.cpu }}"

          args:
            - "--config-file=/etc/besu/config.toml"
            - "--genesis-file=/etc/genesis/genesis.json"
            - "--data-path=/data"

            - "--Xdns-enabled=true"
            - "--Xdns-update-enabled=true"

            - "--metrics-enabled=true"
            - "--metrics-host=0.0.0.0"
            - "--metrics-port=9545"

            - "--host-allowlist=*"

            - "--version-compatibility-protection=false"

          ports:
            - containerPort: 30303
              name: discovery
              protocol: UDP

            - containerPort: 30303
              name: rlpx
              protocol: TCP

            - containerPort: 9545
              name: metrics
              protocol: TCP

          startupProbe:
            tcpSocket:
              port: 30303
            failureThreshold: 30
            periodSeconds: 10

          readinessProbe:
            tcpSocket:
              port: 30303
            initialDelaySeconds: 60
            periodSeconds: 10

          livenessProbe:
            tcpSocket:
              port: 30303
            initialDelaySeconds: 120
            periodSeconds: 20

          volumeMounts:
            - mountPath: /secrets
              name: keys
              readOnly: true

            - mountPath: /etc/genesis
              name: genesis
              readOnly: true

            - mountPath: /etc/besu/static-nodes.json
              name: static-nodes
              subPath: static-nodes.json
              readOnly: true

            - mountPath: /etc/besu/config.toml
              name: validator-config
              subPath: config.toml
              readOnly: true

            - mountPath: /data
              name: besu-data

      volumes:
        - name: genesis
          configMap:
            name: besu-genesis-configmap

        - name: static-nodes
          configMap:
            name: besu-static-nodes-json-configmap

        - name: validator-config
          configMap:
            name: besu-validators-config-toml-configmap

        - name: keys
          secret:
            secretName: besu-network-secret
            items:
              - key: {{ .key }}
                path: validator.key

  volumeClaimTemplates:
    - metadata:
        name: besu-data

      spec:
        accessModes:
          - ReadWriteOnce

        storageClassName: {{ $.Values.storage.className }}

        resources:
          requests:
            storage: {{ $.Values.storage.size }}

---
apiVersion: v1
kind: Service

metadata:
  name: {{ .name }}
  namespace: {{ $.Release.Namespace }}

  labels:
    app: {{ .name }}
    app.kubernetes.io/name: besu
    app.kubernetes.io/component: validator

spec:
  clusterIP: None

  type: {{ $.Values.service.type }}

  selector:
    app: {{ .name }}

  ports:
    - name: discovery
      port: 30303
      protocol: UDP
      targetPort: 30303

    - name: rlpx
      port: 30303
      protocol: TCP
      targetPort: 30303

    - name: metrics
      port: 9545
      protocol: TCP
      targetPort: 9545

{{- end }}