apiVersion: policy/v1
kind: PodDisruptionBudget

metadata:
  name: besu-validators-pdb
  namespace: {{ .Release.Namespace }}

  labels:
    {{- include "besu.validatorLabels" . | nindent 4 }}

spec:
  minAvailable: {{ .Values.validators.pdb.minAvailable }}

  selector:
    matchLabels:
      app.kubernetes.io/component: validator